<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QBReader M3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-outline: #938F99;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            overscroll-behavior: none;
            /* Use dvh (dynamic viewport height) to account for mobile address bars */
            height: 100vh;
            height: 100dvh;
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 16px;
        }

        .m3-btn-primary {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border-radius: 100px;
            font-weight: 500;
            letter-spacing: 0.1px;
            transition: opacity 0.2s;
        }

        .m3-btn-tonal {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            border-radius: 100px;
        }

        .answer-highlight b, .answer-highlight u {
            color: var(--md-sys-color-primary);
            text-decoration: underline;
        }

        /* Compact text styles */
        .question-text {
            font-size: 0.95rem;
            line-height: 1.4;
            letter-spacing: 0.2px;
        }

        .chip-active {
            background-color: var(--md-sys-color-primary) !important;
            color: var(--md-sys-color-on-primary) !important;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid var(--md-sys-color-on-primary);
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ensure the main container fits the viewport perfectly */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top App Bar -->
        <header class="px-4 py-3 flex items-center justify-between border-b border-gray-800 shrink-0">
            <h1 class="text-lg font-medium tracking-tight">QBReader <span class="text-xs opacity-60 font-normal">Tossups</span></h1>
            <button id="settingsBtn" class="p-2 rounded-full hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <!-- Main Question View -->
        <main class="flex-grow flex flex-col p-4 overflow-hidden relative">
            <div id="metaInfo" class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 flex flex-wrap gap-2 shrink-0">
                Ready to read...
            </div>

            <div id="scrollContainer" class="flex-grow overflow-y-auto pr-1">
                <div id="questionBody" class="question-text opacity-90 transition-opacity">
                    Tap "Next" to fetch a tossup. You can filter categories and difficulty in settings.
                </div>

                <div id="answerCard" class="hidden mt-4 p-3 m3-card border-l-4 border-[#D0BCFF]">
                    <div class="text-[10px] font-bold text-[#D0BCFF] uppercase mb-1 tracking-wider">Answer</div>
                    <div id="answerText" class="text-sm italic leading-snug answer-highlight"></div>
                </div>
            </div>

            <!-- Sticky Controls -->
            <div class="mt-4 flex gap-3 pb-safe shrink-0">
                <button id="revealBtn" class="flex-1 py-4 m3-btn-tonal text-sm font-medium disabled:opacity-30" disabled>
                    Reveal
                </button>
                <button id="nextBtn" class="flex-[2] py-4 m3-btn-primary text-sm font-medium flex items-center justify-center gap-2">
                    <span id="loader" class="loader hidden"></span>
                    <span id="nextBtnLabel">Next Tossup</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Settings Overlay -->
    <div id="settingsOverlay" class="fixed inset-0 bg-black/80 z-50 transition-opacity opacity-0 pointer-events-none">
        <div class="absolute bottom-0 left-0 right-0 m3-card rounded-b-none p-6 transform translate-y-full transition-transform duration-300 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-medium">Filters</h2>
                <button id="closeSettings" class="text-sm font-medium text-[#D0BCFF]">Done</button>
            </div>

            <div class="mb-6">
                <label class="text-sm font-medium opacity-60 block mb-3">Difficulty (1-10)</label>
                <div class="flex items-center gap-4">
                    <input type="number" id="minDiff" value="1" min="1" max="10" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-center">
                    <span>to</span>
                    <input type="number" id="maxDiff" value="10" min="1" max="10" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-center">
                </div>
            </div>

            <div class="mb-4">
                <label class="text-sm font-medium opacity-60 block mb-3">Categories</label>
                <div id="categoryGrid" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            "Literature", "History", "Science", "Fine Arts", "Religion", 
            "Mythology", "Philosophy", "Social Science", "Current Events", 
            "Geography", "Other Academic", "Trash"
        ];

        let selectedCategories = [...categories];
        let isLoading = false;

        const ui = {
            nextBtn: document.getElementById('nextBtn'),
            nextBtnLabel: document.getElementById('nextBtnLabel'),
            revealBtn: document.getElementById('revealBtn'),
            loader: document.getElementById('loader'),
            questionBody: document.getElementById('questionBody'),
            answerCard: document.getElementById('answerCard'),
            answerText: document.getElementById('answerText'),
            metaInfo: document.getElementById('metaInfo'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            settingsPanel: document.querySelector('#settingsOverlay > div'),
            closeSettings: document.getElementById('closeSettings'),
            categoryGrid: document.getElementById('categoryGrid'),
            minDiff: document.getElementById('minDiff'),
            maxDiff: document.getElementById('maxDiff'),
            scrollContainer: document.getElementById('scrollContainer')
        };

        function init() {
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'py-2 px-3 m3-btn-tonal text-xs chip-active text-center transition-all truncate';
                btn.textContent = cat;
                btn.onclick = () => toggleCategory(cat, btn);
                ui.categoryGrid.appendChild(btn);
            });

            ui.settingsBtn.onclick = toggleSettings;
            ui.closeSettings.onclick = toggleSettings;
            ui.nextBtn.onclick = fetchTossup;
            ui.revealBtn.onclick = revealAnswer;
        }

        function toggleCategory(cat, el) {
            if (selectedCategories.includes(cat)) {
                selectedCategories = selectedCategories.filter(c => c !== cat);
                el.classList.remove('chip-active');
            } else {
                selectedCategories.push(cat);
                el.classList.add('chip-active');
            }
        }

        function toggleSettings() {
            const isHidden = ui.settingsOverlay.classList.contains('opacity-0');
            if (isHidden) {
                ui.settingsOverlay.classList.remove('opacity-0', 'pointer-events-none');
                ui.settingsPanel.classList.remove('translate-y-full');
            } else {
                ui.settingsOverlay.classList.add('opacity-0', 'pointer-events-none');
                ui.settingsPanel.classList.add('translate-y-full');
            }
        }

        async function fetchTossup() {
            if (isLoading) return;
            
            isLoading = true;
            ui.nextBtnLabel.textContent = "Loading...";
            ui.loader.classList.remove('hidden');
            ui.answerCard.classList.add('hidden');
            ui.revealBtn.disabled = true;
            ui.questionBody.style.opacity = '0.4';

            const params = new URLSearchParams({
                questionType: 'tossup',
                minDifficulty: ui.minDiff.value,
                maxDifficulty: ui.maxDiff.value
            });
            selectedCategories.forEach(c => params.append('categories', c));

            try {
                const response = await fetch(`https://www.qbreader.org/api/random-tossup?${params.toString()}`);
                const data = await response.json();

                if (data.tossups && data.tossups.length > 0) {
                    const t = data.tossups[0];
                    ui.questionBody.innerHTML = t.question;
                    ui.answerText.innerHTML = t.answer;
                    ui.metaInfo.innerHTML = `
                        <span>${t.set.name}</span>
                        <span>•</span>
                        <span>Diff ${t.difficulty}</span>
                        <span>•</span>
                        <span>${t.category}</span>
                    `;
                    ui.revealBtn.disabled = false;
                } else {
                    ui.questionBody.innerHTML = "No questions found with these filters.";
                }
            } catch (e) {
                ui.questionBody.innerHTML = "Connection Error. Are you online?";
            } finally {
                isLoading = false;
                ui.nextBtnLabel.textContent = "Next Tossup";
                ui.loader.classList.add('hidden');
                ui.questionBody.style.opacity = '1';
                ui.scrollContainer.scrollTop = 0;
            }
        }

        function revealAnswer() {
            ui.answerCard.classList.remove('hidden');
            ui.revealBtn.disabled = true;
            setTimeout(() => {
                ui.answerCard.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 50);
        }

        init();
    </script>
</body>
</html>
